<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background: rounded square with gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#512BD4"/>
      <stop offset="100%" style="stop-color:#7B3FF2"/>
    </linearGradient>
    <linearGradient id="console" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D30"/>
      <stop offset="100%" style="stop-color:#1E1E1E"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>

  <!-- Console window -->
  <rect x="16" y="24" width="96" height="72" rx="8" fill="url(#console)" stroke="#3C3C3C" stroke-width="2"/>

  <!-- Console header bar -->
  <rect x="16" y="24" width="96" height="16" rx="8" fill="#3C3C3C"/>
  <rect x="16" y="32" width="96" height="8" fill="#3C3C3C"/>

  <!-- Window buttons -->
  <circle cx="28" cy="32" r="4" fill="#FF605C"/>
  <circle cx="40" cy="32" r="4" fill="#FFBD44"/>
  <circle cx="52" cy="32" r="4" fill="#00CA4E"/>

  <!-- Clean console lines (good logs) -->
  <rect x="24" y="48" width="48" height="4" rx="2" fill="#4EC9B0"/>
  <rect x="24" y="58" width="36" height="4" rx="2" fill="#9CDCFE"/>
  <rect x="24" y="68" width="56" height="4" rx="2" fill="#CE9178"/>
  <rect x="24" y="78" width="28" height="4" rx="2" fill="#4EC9B0"/>

  <!-- Sparkles everywhere! -->
  <g fill="#FFD700">
    <!-- Big sparkle top right -->
    <polygon points="105,12 108,20 116,20 110,26 112,34 105,28 98,34 100,26 94,20 102,20"/>
    <!-- Medium sparkle -->
    <polygon points="118,50 120,54 124,54 121,57 122,61 118,58 114,61 115,57 112,54 116,54"/>
    <!-- Small sparkle top -->
    <polygon points="78,8 79,11 82,11 80,13 81,16 78,14 75,16 76,13 74,11 77,11"/>
  </g>
  <g fill="#FFFFFF" opacity="0.9">
    <!-- White sparkles for extra pop -->
    <polygon points="115,28 116,31 119,31 117,33 118,36 115,34 112,36 113,33 111,31 114,31"/>
    <polygon points="90,18 91,20 93,20 91.5,21.5 92,24 90,22.5 88,24 88.5,21.5 87,20 89,20"/>
  </g>

  <!-- Clean swoosh effect -->
  <path d="M 75 88 Q 95 78, 118 92" stroke="#FFD700" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 82 94 Q 100 86, 120 102" stroke="#FFF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
