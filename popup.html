<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      width: 450px;
      min-height: 300px;
      max-height: 500px;
      padding: 10px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      font-size: 13px;
      margin: 0;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #fff;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      background: #0e639c;
      color: white;
    }
    button:hover {
      background: #1177bb;
    }
    button.secondary {
      background: #3c3c3c;
    }
    button.secondary:hover {
      background: #4c4c4c;
    }
    #logs {
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      padding: 8px;
      height: 200px;
      overflow-y: auto;
      font-family: Consolas, monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-entry {
      padding: 2px 0;
      border-bottom: 1px solid #2d2d2d;
    }
    .log-entry:last-child {
      border-bottom: none;
    }
    .log-entry.error {
      color: #f48771;
    }
    .log-entry.warn {
      color: #cca700;
    }
    .log-entry.info {
      color: #75beff;
    }
    .timestamp {
      color: #6a9955;
      margin-right: 8px;
    }
    .type {
      color: #569cd6;
      margin-right: 8px;
      text-transform: uppercase;
      font-size: 10px;
    }
    #status {
      margin-top: 8px;
      font-size: 11px;
      color: #6a9955;
      min-height: 16px;
    }
    .shortcut-hint {
      font-size: 11px;
      color: #808080;
      margin-top: 8px;
    }
    kbd {
      background: #3c3c3c;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: Consolas, monospace;
    }
  </style>
</head>
<body>
  <h3>Console Cleaner</h3>

  <div class="controls">
    <button id="copyLogs">Copy Clean Logs</button>
    <button id="refresh" class="secondary">Refresh</button>
    <button id="clear" class="secondary">Clear</button>
    <button id="cleanClipboard">Clean Clipboard</button>
  </div>

  <div id="logs">Loading...</div>

  <div id="status"></div>

  <div class="shortcut-hint">
    Tip: <kbd>Alt+Shift+C</kbd> cleans clipboard instantly
  </div>

  <script src="popup.js"></script>
</body>
</html>
