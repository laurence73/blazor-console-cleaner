<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      width: 320px;
      padding: 16px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      font-size: 13px;
      margin: 0;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 15px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h3::before {
      content: "✨";
    }
    .description {
      margin-bottom: 16px;
      line-height: 1.5;
      color: #9d9d9d;
    }
    button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      background: linear-gradient(135deg, #512BD4, #7B3FF2);
      color: white;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(123, 63, 242, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #6a9955;
      min-height: 18px;
      text-align: center;
    }
    .shortcut-hint {
      font-size: 11px;
      color: #6d6d6d;
      margin-top: 16px;
      text-align: center;
      border-top: 1px solid #333;
      padding-top: 12px;
    }
    kbd {
      background: #3c3c3c;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: Consolas, monospace;
      font-size: 11px;
      color: #fff;
    }
  </style>
</head>
<body>
  <h3>Blazor Console Cleaner</h3>

  <p class="description">
    Removes Blazor/WASM stack traces and source references from your clipboard.
  </p>

  <button id="cleanClipboard">Clean Clipboard</button>

  <div id="status"></div>

  <div class="shortcut-hint">
    Tip: Use <kbd>Alt</kbd> + <kbd>Shift</kbd> + <kbd>C</kbd> anytime
  </div>

  <script src="popup.js"></script>
</body>
</html>
