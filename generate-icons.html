<!DOCTYPE html>
<html>
<head>
  <title>Generate Console Cleaner Icons</title>
  <style>
    body { font-family: system-ui; padding: 40px; background: #1e1e1e; color: #fff; }
    .preview { display: flex; gap: 20px; align-items: end; margin: 20px 0; }
    .preview > div { text-align: center; }
    canvas { border: 1px solid #444; background: #333; }
    button { padding: 12px 24px; font-size: 16px; background: #512BD4; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
    button:hover { background: #7B3FF2; }
    h1 { color: #9CDCFE; }
  </style>
</head>
<body>
  <h1>Blazor Console Cleaner - Icon Generator</h1>
  <p>Click each button to download the icon at that size:</p>

  <div class="preview">
    <div><canvas id="c16" width="16" height="16"></canvas><br>16px</div>
    <div><canvas id="c48" width="48" height="48"></canvas><br>48px</div>
    <div><canvas id="c128" width="128" height="128"></canvas><br>128px</div>
  </div>

  <div>
    <button onclick="download(16)">Download 16px</button>
    <button onclick="download(48)">Download 48px</button>
    <button onclick="download(128)">Download 128px</button>
    <button onclick="downloadAll()">Download All</button>
  </div>

  <script>
const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#512BD4"/>
      <stop offset="100%" style="stop-color:#7B3FF2"/>
    </linearGradient>
    <linearGradient id="console" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D30"/>
      <stop offset="100%" style="stop-color:#1E1E1E"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>
  <rect x="16" y="24" width="96" height="72" rx="8" fill="url(#console)" stroke="#3C3C3C" stroke-width="2"/>
  <rect x="16" y="24" width="96" height="16" rx="8" fill="#3C3C3C"/>
  <rect x="16" y="32" width="96" height="8" fill="#3C3C3C"/>
  <circle cx="28" cy="32" r="4" fill="#FF605C"/>
  <circle cx="40" cy="32" r="4" fill="#FFBD44"/>
  <circle cx="52" cy="32" r="4" fill="#00CA4E"/>
  <rect x="24" y="48" width="48" height="4" rx="2" fill="#4EC9B0"/>
  <rect x="24" y="58" width="36" height="4" rx="2" fill="#9CDCFE"/>
  <rect x="24" y="68" width="56" height="4" rx="2" fill="#CE9178"/>
  <rect x="24" y="78" width="28" height="4" rx="2" fill="#4EC9B0"/>
  <g fill="#FFD700">
    <polygon points="105,12 108,20 116,20 110,26 112,34 105,28 98,34 100,26 94,20 102,20"/>
    <polygon points="118,50 120,54 124,54 121,57 122,61 118,58 114,61 115,57 112,54 116,54"/>
    <polygon points="78,8 79,11 82,11 80,13 81,16 78,14 75,16 76,13 74,11 77,11"/>
  </g>
  <g fill="#FFFFFF" opacity="0.9">
    <polygon points="115,28 116,31 119,31 117,33 118,36 115,34 112,36 113,33 111,31 114,31"/>
    <polygon points="90,18 91,20 93,20 91.5,21.5 92,24 90,22.5 88,24 88.5,21.5 87,20 89,20"/>
  </g>
  <path d="M 75 88 Q 95 78, 118 92" stroke="#FFD700" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 82 94 Q 100 86, 120 102" stroke="#FFF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>`;

const sizes = [16, 48, 128];
const img = new Image();
const blob = new Blob([svgContent], {type: 'image/svg+xml'});
const url = URL.createObjectURL(blob);

img.onload = () => {
  sizes.forEach(size => {
    const canvas = document.getElementById('c' + size);
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, size, size);
  });
};
img.src = url;

function download(size) {
  const canvas = document.getElementById('c' + size);
  const link = document.createElement('a');
  link.download = 'icon' + size + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function downloadAll() {
  sizes.forEach((size, i) => {
    setTimeout(() => download(size), i * 200);
  });
}
  </script>
</body>
</html>
